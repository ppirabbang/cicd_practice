# ============================================================
# ML-Agents 학습 설정 파일
# 
# 사용법:
#   1. 이 파일을 Unity 프로젝트 루트에 저장 (예: config/tbsf_training.yaml)
#   2. Anaconda Prompt에서:
#      conda activate mlagents
#      mlagents-learn config/tbsf_training.yaml --run-id=실험이름
#   3. Unity 에디터에서 Play 버튼 클릭
#   4. 학습이 자동으로 시작됨
#
# 학습 중단: Ctrl+C (Anaconda Prompt에서)
# 학습 재개: --resume 플래그 추가
#   mlagents-learn config/tbsf_training.yaml --run-id=실험이름 --resume
# 학습 덮어쓰기: --force 플래그 추가
#   mlagents-learn config/tbsf_training.yaml --run-id=실험이름 --force
#
# 학습 결과 확인 (TensorBoard):
#   tensorboard --logdir results
#   브라우저에서 http://localhost:6006 접속
#
# 학습된 모델 위치:
#   results/실험이름/BehaviorName.onnx
# ============================================================

# ------------------------------------------------------------
# behaviors: 유닛 종류별 학습 설정
# 
# 각 키(Infantry, Archer 등)는 Unity 에디터의 
# Behavior Parameters 컴포넌트 > Behavior Name과 정확히 일치해야 한다.
# 같은 Behavior Name을 가진 모든 Agent가 이 설정을 공유한다.
#
# [확장 시] 새 유닛 종류를 추가하면 여기에 동일한 구조로 블록을 추가한다.
# ------------------------------------------------------------

behaviors:

  # ============================================================
  # 보병 (Infantry) - 근접 전투 유닛
  # ============================================================
  Halberdier:

    # ----------------------------------------------------------
    # trainer_type: 학습 알고리즘 선택
    #
    # ppo (Proximal Policy Optimization):
    #   - 가장 안정적이고 범용적인 알고리즘
    #   - 우리처럼 continuous action을 사용하는 경우에 적합
    #   - 처음 시작할 때 ppo를 추천
    #
    # sac (Soft Actor-Critic):
    #   - 샘플 효율성이 더 높아 적은 에피소드로 학습 가능
    #   - 그러나 하이퍼파라미터에 더 민감함
    #   - ppo로 기본 학습 확인 후 실험해볼 수 있음
    # ----------------------------------------------------------
    trainer_type: ppo

    # ----------------------------------------------------------
    # max_steps: 총 학습 스텝 수
    #
    # 하나의 "스텝"은 Agent가 한 번 결정을 내리는 것을 의미한다.
    # 우리 구조에서는 유닛이 한 번 행동할 때마다 1 스텝이다.
    #
    # 너무 적으면 학습이 수렴하지 않고, 너무 많으면 시간이 오래 걸린다.
    # 500000으로 시작하고, 학습 그래프를 보면서 조정한다.
    # ----------------------------------------------------------
    max_steps: 500000

    # ----------------------------------------------------------
    # time_horizon: 보상 할인 계산에 사용하는 스텝 수
    #
    # "이 행동의 결과가 몇 스텝 후까지 영향을 미치는가"를 설정한다.
    # 턴제 게임은 한 번의 결정이 게임 끝까지 영향을 주므로 넉넉히 설정.
    # 너무 크면 학습이 느려지고, 너무 작으면 장기적 전략을 못 배운다.
    #
    # 한 판이 보통 30~50턴이고 유닛이 4~6개이면,
    # 한 Agent 기준 약 30~50 스텝이므로 64가 적당하다.
    # ----------------------------------------------------------
    time_horizon: 64

    # ----------------------------------------------------------
    # summary_freq: TensorBoard에 통계를 기록하는 간격 (스텝 단위)
    #
    # 값이 작을수록 그래프가 촘촘하게 기록되지만 학습이 약간 느려진다.
    # 5000이면 5000스텝마다 평균 보상, 손실 등이 기록된다.
    # ----------------------------------------------------------
    summary_freq: 5000

    # ----------------------------------------------------------
    # hyperparameters: 학습 알고리즘의 세부 설정
    # ----------------------------------------------------------
    hyperparameters:

      # batch_size: 한 번의 학습 업데이트에 사용하는 경험 수
      #
      # 경험(experience) = (관찰, 행동, 보상) 한 세트
      # 크면 학습이 안정적이지만 느리고, 작으면 빠르지만 불안정하다.
      # continuous action에서는 512~2048 범위를 권장한다.
      batch_size: 512

      # buffer_size: 학습 업데이트 전에 수집하는 총 경험 수
      #
      # buffer_size개의 경험을 모은 뒤, batch_size씩 나누어 학습한다.
      # buffer_size는 반드시 batch_size보다 커야 한다.
      # 보통 batch_size의 4~10배로 설정한다.
      buffer_size: 5120

      # learning_rate: 학습률
      #
      # 모델의 가중치를 한 번에 얼마나 크게 업데이트하는가.
      # 크면 빠르게 배우지만 불안정, 작으면 안정적이지만 느리다.
      # 0.0003은 PPO의 일반적인 기본값이다.
      learning_rate: 0.0003

      # learning_rate_schedule: 학습률 감소 방식
      #
      # linear: max_steps에 도달할 때까지 학습률을 서서히 0으로 줄인다.
      #   - 처음에는 크게 배우고 나중에는 세밀하게 조정하는 효과.
      # constant: 학습률을 고정한다.
      learning_rate_schedule: linear

      # beta: 엔트로피 정규화 계수 (PPO 전용)
      #
      # 모델이 다양한 행동을 시도하도록 장려하는 정도.
      # 크면 더 많이 탐색(exploration), 작으면 이미 아는 걸 활용(exploitation).
      # 0.005는 continuous action의 기본값이다.
      # 학습 초기에 모델이 한 가지 행동만 반복하면 이 값을 올린다.
      beta: 0.005

      # epsilon: PPO 클리핑 범위
      #
      # 한 번의 업데이트에서 정책이 얼마나 크게 변할 수 있는지 제한한다.
      # 크면 큰 변화를 허용 (빠르지만 불안정), 작으면 제한 (안정적이지만 느림).
      # 0.2는 PPO 논문의 기본값이다. 보통 수정할 필요 없다.
      epsilon: 0.2

      # num_epoch: 수집한 경험으로 몇 번 반복 학습하는가
      #
      # 같은 데이터로 여러 번 학습하면 효율적이지만,
      # 너무 많이 반복하면 과적합(overfitting)이 발생한다.
      # PPO에서는 3~5가 일반적이다.
      num_epoch: 3

      # lambd: GAE (Generalized Advantage Estimation) 파라미터
      #
      # 보상의 분산과 편향 사이의 균형을 조절한다.
      # 1.0에 가까울수록 분산이 크지만 편향이 적고 (장기 보상 중시),
      # 0.0에 가까울수록 분산이 적지만 편향이 크다 (즉각 보상 중시).
      # 0.95는 일반적인 기본값이다.
      lambd: 0.95

    # ----------------------------------------------------------
    # network_settings: 신경망 구조 설정
    # ----------------------------------------------------------
    network_settings:

      # hidden_units: 은닉층의 뉴런 수
      #
      # 입력(관찰 13개) → 은닉층 → 출력(행동 6개) 구조에서
      # 은닉층의 크기를 결정한다.
      # 우리 문제는 입출력이 작으므로 128이면 충분하다.
      # 너무 크면 과적합, 너무 작으면 표현력 부족.
      hidden_units: 128

      # num_layers: 은닉층의 개수
      #
      # 층이 많을수록 복잡한 패턴을 학습할 수 있지만,
      # 학습이 느려지고 과적합 위험이 증가한다.
      # 2층이면 우리 문제에 충분하다.
      num_layers: 2

    # ----------------------------------------------------------
    # reward_signals: 보상 신호 설정
    # ----------------------------------------------------------
    reward_signals:

      # extrinsic: 외부 보상 (우리가 코드에서 AddReward로 부여하는 보상)
      extrinsic:

        # gamma: 보상 할인율
        #
        # 미래 보상을 현재 가치로 얼마나 할인하는가.
        # 1.0에 가까울수록 미래 보상을 중요하게 여기고 (장기 전략),
        # 0.0에 가까울수록 즉각적 보상만 중시한다 (단기 전략).
        #
        # 턴제 게임에서 승패(최종 보상)가 가장 중요하므로
        # 0.99로 높게 설정하여 장기 전략을 학습하게 한다.
        gamma: 0.99

        # strength: 이 보상 신호의 가중치
        #
        # 여러 보상 신호를 조합할 때 각각의 비중을 설정한다.
        # extrinsic 하나만 사용하므로 1.0으로 둔다.
        strength: 1.0

    # ----------------------------------------------------------
    # keep_checkpoints: 학습 중 저장할 체크포인트 수
    #
    # 학습 중간에 모델을 저장해두어, 나중에 특정 시점으로
    # 돌아갈 수 있다. 5이면 가장 최근 5개를 유지한다.
    # ----------------------------------------------------------
    keep_checkpoints: 5

    # ----------------------------------------------------------
    # checkpoint_interval: 체크포인트 저장 간격 (스텝 단위)
    #
    # 50000스텝마다 모델을 저장한다.
    # 학습이 중간에 끊겨도 마지막 체크포인트에서 재개할 수 있다.
    # ----------------------------------------------------------
    checkpoint_interval: 50000

  # ============================================================
  # 궁수 (Archer) - 원거리 유닛
  # 보병과 동일한 구조이지만, 유닛 특성에 따라 하이퍼파라미터를
  # 다르게 설정할 수 있다. 처음에는 동일하게 시작하고,
  # 학습 결과를 보면서 개별 조정한다.
  # ============================================================
  Archer:
    trainer_type: ppo
    max_steps: 500000
    time_horizon: 64
    summary_freq: 5000
    hyperparameters:
      batch_size: 512
      buffer_size: 5120
      learning_rate: 0.0003
      learning_rate_schedule: linear
      beta: 0.005
      epsilon: 0.2
      num_epoch: 3
      lambd: 0.95
    network_settings:
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    checkpoint_interval: 50000


# ============================================================
  # 기병 (Cavalry) - 기동 근접 유닛
  # 보병과 동일한 구조이지만, 유닛 특성에 따라 하이퍼파라미터를
  # 다르게 설정할 수 있다. 처음에는 동일하게 시작하고,
  # 학습 결과를 보면서 개별 조정한다.
  # ============================================================
  Cavalry:
    trainer_type: ppo
    max_steps: 500000
    time_horizon: 64
    summary_freq: 5000
    hyperparameters:
      batch_size: 512
      buffer_size: 5120
      learning_rate: 0.0003
      learning_rate_schedule: linear
      beta: 0.005
      epsilon: 0.2
      num_epoch: 3
      lambd: 0.95
    network_settings:
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    checkpoint_interval: 50000

  # ============================================================
  # [확장 포인트] 새로운 유닛 종류 추가 시
  # 위 블록을 복사하고, 키 이름을 Behavior Name과 일치시킨다.
  # 예:
  #
  # Cavalry:
  #   trainer_type: ppo
  #   max_steps: 500000
  #   ... (나머지 동일)
  #
  # Elite:
  #   trainer_type: ppo
  #   max_steps: 500000
  #   ... (나머지 동일)
  # ============================================================
