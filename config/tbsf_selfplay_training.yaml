# ============================================================
# TBSF Self-Play Training Configuration
# ML vs ML (Self-Play) learning with PPO
#
# Usage:
#   New training (from trained model):
#     mlagents-learn config/tbsf_selfplay_training.yaml --run-id=selfplay01 --initialize-from=test02
#   Resume:
#     mlagents-learn config/tbsf_selfplay_training.yaml --run-id=selfplay01 --resume
# ============================================================

behaviors:

  # --------------------------------------------------------
  # Halberdier (melee infantry)
  # --------------------------------------------------------
  Halberdier:
    trainer_type: ppo

    # PPO hyperparameters
    hyperparameters:
      batch_size: 128
      buffer_size: 2048
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
      beta_schedule: linear
      epsilon_schedule: linear

    # Network
    network_settings:
      normalize: false
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple

    # Reward
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    # Self-Play settings
    self_play:
      save_steps: 50000
      team_change: 100000
      swap_steps: 10000
      play_against_latest_model_ratio: 0.5
      window: 10

    # Training length
    max_steps: 1500000
    time_horizon: 64
    summary_freq: 2000

    # Checkpoints
    checkpoint_interval: 50000
    keep_checkpoints: 5

