# ============================================================
# ML-Agents Training Configuration
# 
# Usage:
#   conda activate mlagents
#   mlagents-learn config/tbsf_training.yaml --run-id=test01
#   Then press Play in Unity Editor
#
# Stop: Ctrl+C in Anaconda Prompt
# Resume: mlagents-learn config/tbsf_training.yaml --run-id=test01 --resume
# Overwrite: mlagents-learn config/tbsf_training.yaml --run-id=test01 --force
#
# TensorBoard: tensorboard --logdir results
#   Open http://localhost:6006
#
# Trained model: results/test01/BehaviorName.onnx
# ============================================================

behaviors:

  # Halberdier - melee unit
  Halberdier:
    trainer_type: ppo
    max_steps: 2000000
    time_horizon: 64
    summary_freq: 2000
    hyperparameters:
      batch_size: 512
      buffer_size: 5120
      learning_rate: 0.0003
      learning_rate_schedule: linear
      beta: 0.005
      epsilon: 0.2
      num_epoch: 3
      lambd: 0.95
    network_settings:
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    checkpoint_interval: 50000

  # Archer - ranged unit
  Archer:
